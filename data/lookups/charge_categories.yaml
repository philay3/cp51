    "18 § 3927": theft
    "18 § 3928": theft
    "18 § 3702": robbery
    "75 § 3732": homicide
    "75 § 3735": homicide
    "75 § 3735.1": aggravated-assault
    # Public order umbrella (harassment, disorderly, obstruction of justice).
    "18 § 2709": public-order
    "18 § 5503": public-order
    "18 § 2715": public-order
    "18 § 5507": public-order
    "18 § 4910": public-order
    "18 § 4912": public-order
    "18 § 4914": public-order
    "18 § 4953": public-order
    "18 § 5121": public-order
    "18 § 5122": public-order
    "18 § 911": public-order
    "23 § 6114": public-order
    # Other traffic umbrella (75 § 37xx not DUI or homicide by vehicle).
