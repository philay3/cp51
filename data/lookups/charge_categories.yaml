  # Inchoate offenses inherit the category of their named target crime, read
  # from the offense text after the " - " separator. Rules are checked in
  # order, first substring match wins, so specific precedes general (retail
  # theft before theft, aggravated assault before assault). Offense text with
  # no resolvable target (bare "Conspiracy", "Criminal Attempt") uses fallback.
  inchoate:
    prefixes: ["18 § 901", "18 § 902", "18 § 903"]
    fallback: inchoate
    rules:
      - {contains: "retail theft", category: retail-theft}
      - {contains: "murder", category: homicide}
      - {contains: "homicide", category: homicide}
      - {contains: "aggravated assault", category: aggravated-assault}
      - {contains: "simple assault", category: simple-assault}
      - {contains: "robbery", category: robbery}
      - {contains: "burglary", category: burglary}
      - {contains: "manufacture", category: drug-delivery}
      - {contains: "delivery", category: drug-delivery}
      - {contains: "intent to manuf", category: drug-delivery}
      - {contains: "possession with intent", category: drug-delivery}
      - {contains: "receiving stolen", category: theft}
      - {contains: "theft", category: theft}
      - {contains: "terroristic", category: terroristic-threats}
      - {contains: "harassment", category: public-order}
      - {contains: "trespass", category: criminal-trespass}
      - {contains: "tres", category: criminal-trespass}
      - {contains: "materially false written statement", category: firearms}
      - {contains: "sales of firearms", category: firearms}
      - {contains: "firearm", category: firearms}
      - {contains: "false signature", category: fraud-forgery}

