# Plain-language charge taxonomy. The phase 4 loader maps statutes to these
# categories; slugs are stable identifiers, do not rename casually.
categories:
  - {slug: drug-possession, name: Drug Possession}
  - {slug: drug-delivery, name: Drug Delivery (PWID)}
  - {slug: dui, name: DUI}
  - {slug: simple-assault, name: Simple Assault}
  - {slug: aggravated-assault, name: Aggravated Assault}
  - {slug: robbery, name: Robbery}
  - {slug: burglary, name: Burglary}
  - {slug: theft, name: Theft}
  - {slug: retail-theft, name: Retail Theft}
  - {slug: firearms, name: Firearms (VUFA)}
  - {slug: criminal-trespass, name: Criminal Trespass}
  - {slug: terroristic-threats, name: Terroristic Threats}
  - {slug: fraud-forgery, name: Fraud and Forgery}
  - {slug: sexual-offenses, name: Sexual Offenses}
  - {slug: homicide, name: Homicide}
  - {slug: possessing-instrument-of-crime, name: Possessing Instrument of Crime}
  - {slug: reckless-endangerment, name: Recklessly Endangering (REAP)}
  - {slug: criminal-mischief, name: Criminal Mischief}
  - {slug: endangering-welfare-children, name: Endangering Welfare of Children}
  - {slug: strangulation, name: Strangulation}
  - {slug: unlawful-restraint, name: Unlawful Restraint / Kidnapping}
  - {slug: resisting-fleeing, name: Resisting / Fleeing}
  - {slug: arson, name: Arson}
  - {slug: communication-facility, name: Criminal Use of Communication Facility}
  - {slug: public-order, name: Public Order}
  - {slug: other-traffic, name: Other Traffic}
  - {slug: inchoate, name: Inchoate Offenses}
  - {slug: other, name: Other}

statute_map:
  # Exact statute strings win over prefixes; longest prefix wins otherwise.
  # Inchoate statutes (18 § 901 attempt, 18 § 902 solicitation, 18 § 903
  # conspiracy) are resolved by offense text first (see the inchoate block);
  # bare inchoate falls to the inchoate category. Keys are base statute, no
  # subsection: "18 § 907" matches "18 § 907 §§ A".
  exact:
    "35 § 780-113 §§ A30": drug-delivery
  prefix:
    "35 § 780-113": drug-possession
    "75 § 3802": dui
    "18 § 2701": simple-assault
    "18 § 2702": aggravated-assault
    "18 § 2501": homicide
    "18 § 2502": homicide
    "18 § 2503": homicide
    "18 § 2504": homicide
    "18 § 2706": terroristic-threats
    "18 § 3121": sexual-offenses
    "18 § 3122": sexual-offenses
    "18 § 3123": sexual-offenses
    "18 § 3124": sexual-offenses
    "18 § 3125": sexual-offenses
    "18 § 3126": sexual-offenses
    "18 § 3502": burglary
    "18 § 3503": criminal-trespass
    "18 § 3701": robbery
    "18 § 3921": theft
    "18 § 3922": theft
    "18 § 3925": theft
    "18 § 3929": retail-theft
    "18 § 4101": fraud-forgery
    "18 § 4106": fraud-forgery
    "18 § 6105": firearms
    "18 § 6106": firearms
    "18 § 6108": firearms
    "18 § 6110": firearms
    # Dedicated categories for high-volume standalone offenses.
    "18 § 907": possessing-instrument-of-crime
    "18 § 908": possessing-instrument-of-crime
    "18 § 2705": reckless-endangerment
    "18 § 3304": criminal-mischief
    "18 § 4304": endangering-welfare-children
    "18 § 2718": strangulation
    "18 § 2902": unlawful-restraint
    "18 § 2901": unlawful-restraint
    "18 § 2903": unlawful-restraint
    "18 § 5104": resisting-fleeing
    "75 § 3733": resisting-fleeing
    "18 § 3301": arson
    "18 § 7512": communication-facility
    # Remaps into existing categories.
    "18 § 6312": sexual-offenses
    "18 § 6301": sexual-offenses
    "18 § 6318": sexual-offenses
    "18 § 3127": sexual-offenses
    "18 § 4915": sexual-offenses
    "18 § 7507.1": sexual-offenses
    "18 § 4120": fraud-forgery
    "18 § 4117": fraud-forgery
    "62 § 1407": fraud-forgery
    "18 § 4114": fraud-forgery
    "18 § 4911": fraud-forgery
    "18 § 4903": fraud-forgery
    "18 § 4904": fraud-forgery
    "25 § 3513": fraud-forgery
    "18 § 6111": firearms
    "18 § 2707.1": firearms
    "18 § 6117": firearms
